conky.config = {
    alignment = 'middle_right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    
    -- --- Tokyo Night Palette ---
    default_color = '#a9b1d6', -- Foreground text
    color1 = '#7aa2f7',        -- Blue (Headers)
    color2 = '#f7768e',        -- Red (Alerts/Graphs)
    color3 = '#e0af68',        -- Yellow/Orange (Storage)
    color4 = '#bb9af7',        -- Purple (Processes)
    color5 = '#7dcfff',        -- Cyan (Accents)
    
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    font = 'JetBrainsMono Nerd Font:size=10',
    gap_x = 0,
    gap_y = 0,
    no_buffers = true,
    
    -- --- Translucency Engine ---
    own_window = true,
    own_window_class = 'conky',
    own_window_type = 'panel',
    own_window_transparent = false,     -- False so it utilizes the color below
    own_window_argb_visual = true,
    own_window_argb_value = 30,        -- Translucency slider (0 = clear, 255 = solid)
    own_window_colour = '#1a1b26',     -- Tokyo Night Dark Base
    
    update_interval = 1.0,
    use_xft = true,
}

conky.text = [[
${color1}${font JetBrainsMono Nerd Font:style=Bold:size=16} STATUS${font}${color}
${hr 2}
${color}Kernel:$color5 $kernel
${color}Uptime:$color5 $uptime

${color1}${font JetBrainsMono Nerd Font:style=Bold:size=12} HARDWARE${font}${color}
${hr 1}
# CPU Information
${color}CPU: ${color5}${execi 600 lscpu | grep "Model name" | cut -d ':' -f 2 | awk '{$1=$1}1'}${color}
${color}Usage: ${color2}$cpu% ${color2}${cpubar 6, 180}${color}
${cpugraph 35, 330 24283b f7768e}

# GPU
${color}GPU: ${color5}${execi 600 nvidia-smi --query-gpu=name --format=csv,noheader -i 0}${color}
${color}Load:  ${color5}${execi 2 nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits -i 0}% ${color} Temp: ${color5}${execi 2 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits -i 0}°C${color} ${color}VRAM: ${color5}${execi 2 nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits -i 0} / ${execi 600 nvidia-smi --query-gpu=memory.total --format=csv,noheader,nounits -i 0} MiB${color}
${execgraph "nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits -i 0" 35, 330 24283b f7768e}

${color}RAM Usage: ${color5}$mem / $memmax $memperc%
${membar 6, 330}

${color3}${font JetBrainsMono Nerd Font:style=Bold:size=12}󰋊 STORAGE${font}${color}
${hr 1}
${color}Root (/)     ${color3}${fs_used /} / ${fs_size /} ${fs_bar 6, 100 /}
${color}Home (/home) ${color3}${fs_used /home} / ${fs_size /home} ${fs_bar 6, 100 /home}

${color4}${font JetBrainsMono Nerd Font:style=Bold:size=12}󰣖 TOP PROCESSES${font}${color}
${hr 1}
${color}Name              PID     CPU%    MEM%${color}
${color4}${top name 1} ${top pid 1} ${top cpu 1} ${top mem 1}
${top name 2} ${top pid 2} ${top cpu 2} ${top mem 2}
${top name 3} ${top pid 3} ${top cpu 3} ${top mem 3}
${top name 4} ${top pid 4} ${top cpu 4} ${top mem 4}
${top name 5} ${top pid 5} ${top cpu 5} ${top mem 5}${color}
]]
