background_opacity 0.8
dynamic_background_opacity yes

# --- Font Configuration ---
# Use the exact name installed on your system
font_family      Adwaita Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
map ctrl+enter new_os_window_with_cwd
kitty_mod ctrl+alt
shell fish
# LAYOUT
enabled_layouts stack
# Create new tab
map alt+q new_tab_with_cwd
# Jump directly to a specific tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10
# Kill the current tab
map alt+c close_tab

# copy and paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# font size
map alt+equal change_font_size all +2.0
map alt+minus change_font_size all -2.0
map alt+backspace change_font_size all 0

# Enable the cursor trail animation (value is the trigger timeout in milliseconds)
cursor_trail 3

# Control the decay time of the trail (higher means a longer-lasting trail)
cursor_trail_decay 0.1 0.4

# Minimum cursor jump distance (in cells) to trigger the trail animation
cursor_trail_start_threshold 2
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME
