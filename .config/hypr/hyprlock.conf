background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text =  $PAMPROMPT
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(255, 255, 255, 0.6)
    font_size = 120
    position = 0, -300
    halign = center
    valign = top
}

label {
    monitor =
    text = $FPRINTPROMPT
    color = rgba(255, 255, 255, 0.6)
    font_size = 25
    position = 0, -40
    halign = center
    valign = center
}

auth {
    pam:enabled = true
    pam:module = hyprlock

    # Enable native fprintd integration
    fingerprint:enabled = true
    fingerprint:ready_message = ꩜ Scan Fingerprint
    fingerprint:present_message = ꩜ Scanning...
    fingerprint:retry_delay = 250
}
